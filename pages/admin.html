<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin — Auto Prime Estética</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #facc15;
      --black: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --surface3: #222222;
      --border: rgba(250,204,21,0.15);
      --text: #f0f0f0;
      --text-muted: #888;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(250,204,21,0.07) 0%, transparent 60%);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), #d4a500, transparent);
    }

    .login-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .login-logo span { color: white; font-weight: 300; }

    .login-card h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
      margin-top: 24px;
    }

    .login-card p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .login-field label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .login-field input {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(250,204,21,0.1);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: var(--gold);
      color: black;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .login-btn:hover { background: #fde047; transform: translateY(-1px); }

    .login-erro {
      color: var(--red);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    /* ── PAINEL ── */
    .painel { display: none; }

    .painel-header {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .painel-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .painel-logo span { color: white; font-weight: 300; }

    .painel-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge-admin {
      background: rgba(250,204,21,0.1);
      border: 1px solid rgba(250,204,21,0.3);
      color: var(--gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
    }

    .btn-sair {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-sair:hover { color: white; border-color: rgba(255,255,255,0.2); }

    .painel-body {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: var(--border); }

    .stat-card-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .stat-card-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }

    /* Filtros */
    .filtros {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filtro-input {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .filtro-input:focus { border-color: var(--gold); }

    .filtro-input[type="date"] { color-scheme: dark; }

    .btn-filtrar {
      background: var(--gold);
      border: none;
      border-radius: 10px;
      color: black;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-filtrar:hover { background: #fde047; }

    .btn-limpar {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      padding: 10px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-limpar:hover { color: white; }

    /* Tabela */
    .tabela-wrapper {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      overflow: hidden;
    }

    .tabela-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tabela-titulo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tabela-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 14px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody td {
      padding: 16px 20px;
      font-size: 14px;
      vertical-align: middle;
    }

    .td-nome { font-weight: 600; }

    .td-horario {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
    }

    .td-data {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 600;
    }

    .td-lavagem {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 180px;
    }

    .badge-veiculo {
      background: var(--surface3);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state span { font-size: 40px; display: block; margin-bottom: 12px; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    /* Btn atualizar */
    .btn-atualizar {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-atualizar:hover { color: white; border-color: rgba(255,255,255,0.2); }

    @media (max-width: 768px) {
      .painel-body { padding: 20px 16px; }
      .painel-header { padding: 14px 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      table { font-size: 13px; }
      thead th, tbody td { padding: 12px 12px; }
      .td-lavagem { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">Auto Prime <span>Estética</span></div>
      <h2>Área Administrativa</h2>
      <p>Digite a senha para acessar o painel de agendamentos.</p>

      <div class="login-field">
        <label>Senha de acesso</label>
        <input type="password" id="senhaInput" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="login-btn" onclick="fazerLogin()">Entrar</button>
      <div class="login-erro" id="loginErro">Senha incorreta. Tente novamente.</div>
    </div>
  </div>

  <!-- PAINEL -->
  <div class="painel" id="painel">

    <div class="painel-header">
      <div class="painel-logo">Auto Prime <span>Estética</span></div>
      <div class="painel-header-right">
        <div class="badge-admin">⚙ Administrador</div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
    </div>

    <div class="painel-body">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">Total de Agendamentos</div>
          <div class="stat-card-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Agendamentos Hoje</div>
          <div class="stat-card-value" id="statHoje">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Esta Semana</div>
          <div class="stat-card-value" id="statSemana">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Este Mês</div>
          <div class="stat-card-value" id="statMes">—</div>
        </div>
      </div>

      <!-- Filtros -->
      <div class="filtros">
        <input type="text" class="filtro-input" id="filtroNome" placeholder="Buscar por nome...">
        <input type="date" class="filtro-input" id="filtroData">
        <button class="btn-filtrar" onclick="filtrar()">Filtrar</button>
        <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
        <button class="btn-atualizar" onclick="carregarAgendamentos()">↻ Atualizar</button>
      </div>

      <!-- Tabela -->
      <div class="tabela-wrapper">
        <div class="tabela-header">
          <div class="tabela-titulo">Agendamentos</div>
          <div class="tabela-count" id="tabelaCount"></div>
        </div>
        <div id="tabelaConteudo">
          <div class="loading">Carregando...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = "https://estetica-g9mn.onrender.com/api";
    const SENHA_ADMIN = "adm01dev";

    let todosAgendamentos = [];

    // ── LOGIN ──────────────────────────────────────────────────────────────────
    function fazerLogin() {
      const senha = document.getElementById("senhaInput").value;
      if (senha === SENHA_ADMIN) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("painel").style.display = "block";
        carregarAgendamentos();
      } else {
        document.getElementById("loginErro").style.display = "block";
      }
    }

    document.getElementById("senhaInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") fazerLogin();
    });

    function sair() {
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("painel").style.display = "none";
      document.getElementById("senhaInput").value = "";
    }

    // ── CARREGAR AGENDAMENTOS ──────────────────────────────────────────────────
    async function carregarAgendamentos() {
      document.getElementById("tabelaConteudo").innerHTML = '<div class="loading">Carregando...</div>';

      try {
        const resp = await fetch(`${API_URL}/agendamentos`);
        todosAgendamentos = await resp.json();
        atualizarStats(todosAgendamentos);
        renderTabela(todosAgendamentos);
      } catch (erro) {
        document.getElementById("tabelaConteudo").innerHTML = '<div class="empty-state"><span>⚠️</span>Erro ao carregar agendamentos.</div>';
        console.error(erro);
      }
    }

    // ── STATS ──────────────────────────────────────────────────────────────────
    function atualizarStats(dados) {
      const hoje = new Date().toISOString().split("T")[0];
      const semana = new Date();
      semana.setDate(semana.getDate() - 7);
      const mes = new Date();
      mes.setDate(1);

      document.getElementById("statTotal").textContent = dados.length;
      document.getElementById("statHoje").textContent = dados.filter(a => a.data_agendamento === hoje).length;
      document.getElementById("statSemana").textContent = dados.filter(a => new Date(a.data_agendamento) >= semana).length;
      document.getElementById("statMes").textContent = dados.filter(a => new Date(a.data_agendamento) >= mes).length;
    }

    // ── FILTROS ────────────────────────────────────────────────────────────────
    function filtrar() {
      const nome = document.getElementById("filtroNome").value.toLowerCase();
      const data = document.getElementById("filtroData").value;

      let filtrados = todosAgendamentos;

      if (nome) filtrados = filtrados.filter(a => a.nome.toLowerCase().includes(nome));
      if (data) filtrados = filtrados.filter(a => a.data_agendamento === data);

      renderTabela(filtrados);
    }

    function limparFiltros() {
      document.getElementById("filtroNome").value = "";
      document.getElementById("filtroData").value = "";
      renderTabela(todosAgendamentos);
    }

    // ── RENDER TABELA ──────────────────────────────────────────────────────────
    function renderTabela(dados) {
      document.getElementById("tabelaCount").textContent = `${dados.length} registro(s)`;

      if (dados.length === 0) {
        document.getElementById("tabelaConteudo").innerHTML = `
          <div class="empty-state">
            <span>📅</span>
            Nenhum agendamento encontrado.
          </div>`;
        return;
      }

      const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

      const linhas = dados.map(a => {
        const [ano, mes, dia] = a.data_agendamento.split("-");
        const dataFormatada = `${dia} ${MESES[parseInt(mes)-1]} ${ano}`;
        const lavagem = a.lavagem ? a.lavagem.split("—")[0].trim() : "—";

        return `
          <tr>
            <td class="td-nome">${a.nome}</td>
            <td>${a.telefone}</td>
            <td><span class="badge-veiculo">${a.tipo_veiculo || "—"}</span> ${a.nome_veiculo || ""}</td>
            <td class="td-lavagem">${lavagem}</td>
            <td class="td-data">${dataFormatada}</td>
            <td class="td-horario">${a.horario}</td>
          </tr>`;
      }).join("");

      document.getElementById("tabelaConteudo").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Telefone</th>
              <th>Veículo</th>
              <th>Serviço</th>
              <th>Data</th>
              <th>Horário</th>
            </tr>
          </thead>
          <tbody>${linhas}</tbody>
        </table>`;
    }
  </script>

</body>
</html>
