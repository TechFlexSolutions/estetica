<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin — Auto Prime Estética</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="admin.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo" onclick="window.location.href='/'">Auto Prime <span>Estética</span></div>
      <h2>Área Administrativa</h2>
      <p>Digite a senha para acessar o painel de agendamentos.</p>

      <div class="login-field">
        <label>Senha de acesso</label>
        <input type="password" id="senhaInput" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="login-btn" onclick="fazerLogin()">Entrar</button>
      <div class="login-erro" id="loginErro">Senha incorreta. Tente novamente.</div>
    </div>
  </div>

  <!-- PAINEL -->
  <div class="painel" id="painel">

    <div class="painel-header">
      <div class="painel-logo" onclick="window.location.href='/'">Auto Prime <span>Estética</span></div>
      <div class="painel-header-right">
        <div class="badge-admin">⚙ Administrador</div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
    </div>

    <div class="painel-body">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">Total de Agendamentos</div>
          <div class="stat-card-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Agendamentos Hoje</div>
          <div class="stat-card-value" id="statHoje">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Esta Semana</div>
          <div class="stat-card-value" id="statSemana">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Este Mês</div>
          <div class="stat-card-value" id="statMes">—</div>
        </div>
      </div>

      <!-- Filtros -->
      <div class="filtros">
        <input type="text" class="filtro-input" id="filtroNome" placeholder="Buscar por nome...">
        <input type="date" class="filtro-input" id="filtroData">
        <button class="btn-filtrar" onclick="filtrar()">Filtrar</button>
        <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
        <button class="btn-atualizar" onclick="carregarAgendamentos()">↻ Atualizar</button>
      </div>

      <!-- Tabela -->
      <div class="tabela-wrapper">
        <div class="tabela-header">
          <div class="tabela-titulo">Agendamentos</div>
          <div class="tabela-count" id="tabelaCount"></div>
        </div>
        <div id="tabelaConteudo">
          <div class="loading">Carregando...</div>
        </div>
      </div>

    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
